<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youth Mental Health — Interactive County Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #F0F7F4; }
#header {
    background: #1B4332; color: white; padding: 12px 20px;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 8px;
}
#header h1 { font-size: 16px; font-weight: bold; }
#header .subtitle { font-size: 12px; color: #B7E4C7; }
#controls {
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}
#controls button {
    padding: 6px 12px; border: 2px solid #52B788; border-radius: 4px;
    background: transparent; color: #B7E4C7; font-size: 11px;
    cursor: pointer; font-family: Arial; transition: all 0.2s;
}
#controls button.active {
    background: #52B788; color: #1B4332; font-weight: bold;
}
#controls button:hover { background: #40916C; color: white; }
#map { width: 100%; height: calc(100vh - 100px); }
#info-panel {
    position: absolute; top: 70px; right: 10px; z-index: 1000;
    background: white; border-radius: 8px; padding: 12px 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15); max-width: 280px;
    font-size: 12px; line-height: 1.5; display: none;
}
#info-panel h3 { font-size: 14px; margin-bottom: 6px; color: #1B4332; }
#info-panel .wa-badge {
    display: inline-block; background: #E85D3A; color: white;
    padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: bold;
}
#info-panel .risk-high { color: #C0392B; font-weight: bold; }
#info-panel .risk-low { color: #2D6A4F; font-weight: bold; }
#info-panel .stat-row { display: flex; justify-content: space-between; padding: 2px 0; }
#info-panel .stat-label { color: #6B7280; }
#info-panel .stat-val { font-weight: bold; color: #1B4332; }
#info-panel .vs-nat { font-size: 10px; color: #6B7280; }
#info-panel hr { border: none; border-top: 1px solid #E5E7EB; margin: 6px 0; }
#stats-bar {
    background: #2D6A4F; color: white; padding: 6px 20px;
    font-size: 12px; display: flex; gap: 20px; flex-wrap: wrap;
}
#stats-bar span { white-space: nowrap; }
#stats-bar .wa-val { color: #F6C243; font-weight: bold; }
#stats-bar .nat-val { color: #B7E4C7; }
.legend {
    position: absolute; bottom: 30px; left: 10px; z-index: 1000;
    background: white; border-radius: 6px; padding: 10px 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 11px;
}
.legend h4 { margin-bottom: 6px; color: #1B4332; font-size: 12px; }
.legend-item { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
.legend-color { width: 16px; height: 12px; border-radius: 2px; border: 1px solid #ccc; }
#zoom-wa {
    position: absolute; bottom: 30px; right: 10px; z-index: 1000;
    background: #E85D3A; color: white; border: none; border-radius: 6px;
    padding: 8px 14px; font-size: 12px; font-weight: bold; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
#zoom-wa:hover { background: #C0392B; }
</style>
</head>
<body>
<div id="header">

</div>
<div id="stats-bar"></div>
<div id="map"></div>
<div id="info-panel"></div>
<div class="legend" id="legend"></div>
<button id="zoom-wa" onclick="zoomToWA()">Zoom to WA</button>

function getColor(value, config) {
    if (value == null || isNaN(value)) return '#E5E7EB';
    const b = config.breaks;
    const c = config.colors;
    for (let i = 0; i < c.length; i++) {
        if (value <= b[i + 1]) return c[i];
    }
    return c[c.length - 1];
}

function formatNum(n) {
    if (n == null) return '—';
    return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function updateInfoPanel(d) {
    if (!d) { document.getElementById('info-panel').style.display = 'none'; return; }
    const panel = document.getElementById('info-panel');
    const waBadge = d.is_wa ? ' <span class="wa-badge">WA</span>' : '';
    const riskClass = d.risk === 1 ? 'risk-high' : 'risk-low';
    const riskText = d.risk === 1 ? 'HIGH-RISK' : 'Lower-Risk';

    const arrow = (val, nat) => {
        const diff = (val - nat).toFixed(1);
        return diff > 0 ? '▲+' + diff : '▼' + diff;
    };

    panel.innerHTML = `
        <h3>${d.county}, ${d.state}${waBadge}</h3>
        <div class="stat-row"><span class="stat-label">Population</span><span class="stat-val">${formatNum(d.population)}</span></div>
        <div class="stat-row"><span class="${riskClass}">${riskText}</span><span class="vs-nat">(threshold: ${medianDistress}%)</span></div>
        <hr>
        <div style="font-weight:bold;color:#1B4332;margin-bottom:4px;">Top 3 Predictors:</div>
        <div class="stat-row"><span class="stat-label">Housing Insecurity</span><span class="stat-val">${d.housing_insecurity_pct}%</span></div>
        <div class="vs-nat">National avg: ${natAvg.housing_insecurity_pct}% (${arrow(d.housing_insecurity_pct, natAvg.housing_insecurity_pct)})</div>
        <div class="stat-row"><span class="stat-label">Physical Inactivity</span><span class="stat-val">${d.physical_inactivity_pct}%</span></div>
        <div class="vs-nat">National avg: ${natAvg.physical_inactivity_pct}% (${arrow(d.physical_inactivity_pct, natAvg.physical_inactivity_pct)})</div>
        <div class="stat-row"><span class="stat-label">Obesity</span><span class="stat-val">${d.obesity_pct}%</span></div>
        <div class="vs-nat">National avg: ${natAvg.obesity_pct}% (${arrow(d.obesity_pct, natAvg.obesity_pct)})</div>
        <hr>
        <div class="stat-row"><span class="stat-label">Mental Distress</span><span class="stat-val">${d.mental_distress_pct}%</span></div>
        <div class="stat-row"><span class="stat-label">Depression</span><span class="stat-val">${d.depression_pct}%</span></div>
        <div class="stat-row"><span class="stat-label">Uninsured</span><span class="stat-val">${d.uninsured_pct}%</span></div>
    `;
    panel.style.display = 'block';
}

function updateLegend(config) {
    const legend = document.getElementById('legend');
    let html = '<h4>' + config.label + '</h4>';
    if (config.labels) {
        config.colors.forEach((c, i) => {
            html += '<div class="legend-item"><div class="legend-color" style="background:' + c + '"></div>' + config.labels[i] + '</div>';
        });
    } else {
        config.colors.forEach((c, i) => {
            html += '<div class="legend-item"><div class="legend-color" style="background:' + c + '"></div>' +
                config.breaks[i].toFixed(1) + ' – ' + config.breaks[i+1].toFixed(1) + '%</div>';
        });
    }
    html += '<div class="legend-item" style="margin-top:4px;"><div class="legend-color" style="background:transparent;border:2px solid #E85D3A;"></div>WA counties</div>';
    legend.innerHTML = html;
}

function updateStatsBar() {
    const bar = document.getElementById('stats-bar');
    const cfg = layerConfig[currentLayer];
    if (currentLayer === 'risk') {
        bar.innerHTML = '<span>Layer: <b>' + cfg.label + '</b></span>' +
            '<span>WA: <span class="wa-val">' + waAvg.risk + '</span></span>' +
            '<span>National threshold: <span class="nat-val">' + medianDistress + '%</span></span>';
    } else {
        const diff = (waAvg[currentLayer] - natAvg[currentLayer]).toFixed(1);
        const arrow = diff > 0 ? '▲' : '▼';
        bar.innerHTML = '<span>Layer: <b>' + cfg.label + '</b></span>' +
            '<span>WA avg: <span class="wa-val">' + waAvg[currentLayer] + '%</span></span>' +
            '<span>National avg: <span class="nat-val">' + natAvg[currentLayer] + '%</span></span>' +
            '<span>Gap: <span class="wa-val">' + arrow + diff + 'pp</span></span>';
    }
}

function styleFeature(feature) {
    const fips = feature.properties.STATE + feature.properties.COUNTY;
    const d = dataByFips[fips];
    const cfg = layerConfig[currentLayer];
    const val = d ? d[currentLayer] : null;
    return {
        fillColor: getColor(val, cfg),
        weight: d && d.is_wa ? 2.5 : 0.4,
        color: d && d.is_wa ? '#E85D3A' : '#FFFFFF',
        fillOpacity: val != null ? 0.8 : 0.15,
    };
}

function onEachFeature(feature, layer) {
    const fips = feature.properties.STATE + feature.properties.COUNTY;
    const d = dataByFips[fips];
    layer.on({
        mouseover: function(e) {
            e.target.setStyle({ weight: 3, color: '#1B1B1B' });
            e.target.bringToFront();
            updateInfoPanel(d);
        },
        mouseout: function(e) {
            geoLayer.resetStyle(e.target);
            document.getElementById('info-panel').style.display = 'none';
        },
        click: function(e) {
            updateInfoPanel(d);
        }
    });
}

function setLayer(layerName) {
    currentLayer = layerName;
    document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    if (geoLayer) geoLayer.setStyle(styleFeature);
    updateLegend(layerConfig[layerName]);
    updateStatsBar();
}

function zoomToWA() {
    map.flyTo([47.3, -120.5], 7, { duration: 1.5 });
}

// ── Load GeoJSON ────────────────────────────────────────────────
fetch('https://raw.githubusercontent.com/plotly/datasets/master/geojson-counties-fips.json')
    .then(r => r.json())
    .then(geojson => {
        geoLayer = L.geoJSON(geojson, {
            style: styleFeature,
            onEachFeature: onEachFeature,
        }).addTo(map);
        updateLegend(layerConfig[currentLayer]);
        updateStatsBar();
    });
</script>
</body>
</html>
